schemaVersion: "1"
kind: sandbox
name: claude-vscode
displayName: VSCode with Claude Code
description: Allow VSCode and the VSCode Claude Code extension

sandbox:
  image: "docker.io/library/sbx-vscode-arm64:latest"
  aiFilename: CLAUDE.md
  entrypoint:
    run: ["code", "tunnel"]

network:
  # Egress is deny-by-default; only the hosts below are reachable from inside the
  # sandbox. Trim any group you don't need to keep the attack surface small.
  allowedDomains:
    # --- Claude / Anthropic: Claude Code sign-in, API, downloads (required) ---
    - "claude.com:443"
    - "claude.ai:443"
    - "platform.claude.com:443"
    - "downloads.claude.ai:443"
    - "api.anthropic.com:443"

    # --- VS Code: tunnel service, editor downloads, CDN (required) ---
    - "go.microsoft.com:443" # update/tunnel redirects
    - "vscode.download.prss.microsoft.com:443"
    - "main.vscode-cdn.net:443"

    # --- VS Code Marketplace: the anthropic.claude-code extension gallery ---
    - "anthropic.gallery.vsassets.io:443"
    - "anthropic.gallerycdn.vsassets.io:443"

    # --- Git / GitHub: clone & push (HTTPS), gh CLI, release assets, GHCR ---
    - "github.com:443"
    - "*.github.com:443" # api.github.com, codeload.github.com, gist
    - "*.githubusercontent.com:443" # raw, objects (release assets), pkg-containers
    - "ghcr.io:443"

    # --- OS packages: apt on Ubuntu arm64 is served over HTTP from ports.ubuntu.com ---
    - "ports.ubuntu.com:80"
    - "packages.microsoft.com:443" # VS Code apt channel (preconfigured in the image)
    - "download.docker.com:443" # Docker CE apt channel (preconfigured in the image)

    # --- Python: pip / uv / poetry ---
    - "pypi.org:443"
    - "files.pythonhosted.org:443" # wheels & sdists

    # --- TypeScript / Node: npm / pnpm / yarn, and node installers ---
    - "registry.npmjs.org:443"
    - "registry.yarnpkg.com:443"
    - "nodejs.org:443"

    # --- DevOps: container registries ---
    - "*.docker.io:443" # Docker Hub (registry-1, auth)
    - "production.cloudflare.docker.com:443" # Docker Hub blob CDN
    - "quay.io:443"
    - "*.quay.io:443"
    - "registry.k8s.io:443"
    - "*.pkg.dev:443" # registry.k8s.io redirect targets (Artifact Registry)
    - "pkgs.k8s.io:443" # kubectl / kubeadm apt repo
    - "dl.k8s.io:443" # kubectl binaries

    # --- DevOps: IaC & CLI tooling ---
    - "releases.hashicorp.com:443" # terraform, vault, packer binaries
    - "registry.terraform.io:443" # terraform providers & modules
    - "get.helm.sh:443" # helm binary
