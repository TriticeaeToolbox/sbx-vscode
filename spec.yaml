schemaVersion: "1"
kind: sandbox
name: claude-vscode
displayName: VSCode with Claude Code
description: Allow VSCode and the VSCode Claude Code extension

sandbox:
  image: "docker.io/library/sbx-vscode-arm64:latest"
  aiFilename: CLAUDE.md
  entrypoint:
    run: ["code", "tunnel"]

network:
  # We assume a balanced network policy is in place (default). Cannot be set in the spec.yaml file.
  # sbx policy init balanced
  allowedDomains:
    # --- VS Code tunnel + editor + Marketplace (not in balanced) ---
    - "claude.ai:443" # Claude Code sign-in (balanced has claude.com only)
    - "go.microsoft.com:443" # tunnel / update redirects
    - "vscode.download.prss.microsoft.com:443" # editor download
    - "main.vscode-cdn.net:443" # editor CDN
    - "anthropic.gallery.vsassets.io:443" # claude-code extension gallery
    - "anthropic.gallerycdn.vsassets.io:443" # claude-code extension CDN
